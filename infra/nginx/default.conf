map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name sunu-cagnotte.org www.sunu-cagnotte.org;

    root /srv/backend/public;
    index index.php;

    client_max_body_size 12m;

    location = /health {
        try_files $uri /index.php$is_args$args;
    }

    location /api {
        try_files $uri /index.php$is_args$args;
    }

    location /uploads {
        try_files $uri /index.php$is_args$args;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://frontend:5173;
    }

    location ~ ^/index\.php(/|$) {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /srv/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /srv/backend/public;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param HTTP_X_AUTH_TOKEN $http_x_auth_token;
        fastcgi_pass php:9000;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
