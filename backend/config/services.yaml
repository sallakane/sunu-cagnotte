parameters:
  app.contact_recipient: '%env(CONTACT_RECIPIENT)%'
  app.base_url: '%env(APP_BASE_URL)%'
  app.frontend_base_url: '%env(FRONTEND_BASE_URL)%'
  app.payment_provider: '%env(PAYMENT_PROVIDER)%'

services:
  Psr\Log\LoggerInterface: '@logger'

  _defaults:
    autowire: true
    autoconfigure: true

  _instanceof:
    App\Service\Payment\PaymentProviderInterface:
      tags: ['app.payment_provider']

  App\:
    resource: '../src/'
    exclude:
      - '../src/Entity/'
      - '../src/Kernel.php'

  App\Service\Payment\PayTech\PayTechProvider:
    arguments:
      $mode: '%env(string:PAYTECH_MODE)%'
      $apiKey: '%env(string:PAYTECH_API_KEY)%'
      $apiSecret: '%env(string:PAYTECH_API_SECRET)%'
      $targetPayment: '%env(string:PAYTECH_TARGET_PAYMENT)%'

  App\Service\Payment\PaymentProviderRegistry:
    arguments:
      $providers: !tagged_iterator app.payment_provider

  App\Controller\ContributionController:
    arguments:
      $paymentProvider: '%app.payment_provider%'
      $appBaseUrl: '%app.base_url%'
      $frontendBaseUrl: '%app.frontend_base_url%'

  App\Service\Mailer\TransactionalMailer:
    arguments:
      $contactRecipient: '%app.contact_recipient%'
      $frontendBaseUrl: '%app.frontend_base_url%'
