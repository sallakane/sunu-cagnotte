security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    login:
      pattern: ^/api/auth/login
      stateless: true
      json_login:
        check_path: /api/auth/login
        username_path: email
        password_path: password
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    api:
      pattern: ^/api
      stateless: true
      provider: app_user_provider
      jwt: ~

    main:
      security: false

  access_control:
    - { path: ^/health$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/register$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/forgot-password$, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/reset-password$, roles: PUBLIC_ACCESS }
    - { path: ^/api/fundraisers$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/fundraisers/.+/contributions/initiate$, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/fundraisers/.+$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/contact$, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/payments/paydunya/ipn$, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/payments/paydunya/return$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/admin, roles: ROLE_ADMIN }
    - { path: ^/api/me, roles: ROLE_USER }
    - { path: ^/api/fundraisers$, roles: ROLE_USER, methods: [POST] }
    - { path: ^/api/fundraisers/.+, roles: ROLE_USER, methods: [PUT, PATCH] }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
