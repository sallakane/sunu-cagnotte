name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env files
        run: |
          cp .env.example .env
          cp backend/.env.dist backend/.env
          cp frontend/.env.example frontend/.env

      - name: Start stack
        run: docker compose up -d --build

      - name: Backend PHP lint
        run: |
          docker compose exec -T php php -l src/Controller/AuthController.php
          docker compose exec -T php php -l src/Controller/FundraiserOwnerController.php
          docker compose exec -T php php -l src/Entity/User.php
          docker compose exec -T php php -l src/Service/Mailer/TransactionalMailer.php
          docker compose exec -T php php bin/console lint:twig templates/emails

      - name: Frontend build
        run: docker compose exec -T frontend npm run build

      - name: Stop stack
        if: always()
        run: docker compose down -v
